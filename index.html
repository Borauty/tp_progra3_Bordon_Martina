<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de frutas</title>
    <script src="js/main.js" defer></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Header -->
    <header class="header">
        
        <a href="index.html">
            <div class="logo">Frutería</div>
        </a>
        
        <div class="nombreAlumno">
            <nav id="nav_modificable"></nav>
        </div>

        <input type="text" placeholder="Buscar..." class="barra-busqueda">

        <div class="carrito">
            <span>Carrito: <span id="contador-carrito">0</span> productos</span>
        </div>
    </header>


    <!-- Contenedor principal -->
    <main>
        <section class="seccion-productos">
            <h2>Nuestras frutas</h2>
            <div class="botones-orden">
            <button id="OrdenarAZ">Ordenar A-Z</button>
            <button id="OrdenarZA">Ordenar Z-A</button>
            <button id="botonMasMen">Precio menor-mayor</button>
            <button id="botonMenMas">Precio mayor-menor</button>

</div>
            <div id="contenedor-productos">
            </div>
        </section>


        <!-- Seccion carrito -->
        <section class="seccion-carrito">
            <h2>Carrito</h2>

            <div id="items-carrito">
                <p>No hay elementos en el carrito.</p>
            </div>

            <div class="total-carrito">
                <p>Total: <span id="precio-total">$0.00</span></p>
            </div>
            <div><button id="vaciar-carrito">Vaciar carrito</button></div>
        </section>
    </main>
</body>

</html>
